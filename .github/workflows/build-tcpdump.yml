name: Build luci-app-tcpdump IPK for N1 iStoreOS 24.10.5

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build env
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone iStoreOS 24.10.5 SDK
        run: git clone --depth=1 https://github.com/istoreos/istoreos.git -b istoreos-24.10 istoreos

      - name: Add luci-app-tcpdump
        run: git clone https://github.com/KFERMercer/luci-app-tcpdump.git istoreos/package/luci-app-tcpdump

      - name: Update feeds
        run: |
          cd istoreos
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Set N1 target (arm64)
        run: |
          cd istoreos
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          EOF
          make defconfig
          
      # +++ 新增的关键步骤：准备工具链和依赖包 +++
      - name: Build toolchain and dependencies
        run: |
          cd istoreos
          # 1. 编译并安装所有主机工具（host tools），这应该会构建出 libdeflate
          make toolchain/install -j$(nproc) V=s
          # 2. 编译并安装必要的 SDK 和基础包，确保 lua、libdeflate 等已就绪
          make -j$(nproc) V=s
        # 注意：此步骤可能耗时，但能解决大部分环境依赖问题。

      - name: Build IPK
        run: |
          cd istoreos
          make package/luci-app-tcpdump/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-tcpdump-n1-ipk
          path: istoreos/bin/packages/*/luci/luci-app-tcpdump*.ipk