name: 2-Build luci-app-tcpdump (KFERMercer) for iStoreOS 24.10

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev libssl-dev git gawk gettext \
            xsltproc wget unzip zip python3 python3-pip libtool-bin cmake flex bison pkg-config libdeflate-dev

      - name: Clone iStoreOS (istoreos-24.10 branch)
        run: |
          git clone --depth 1 -b istoreos-24.10 https://github.com/istoreos/istoreos.git
          cd istoreos
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 你指定的仓库：https://github.com/KFERMercer/luci-app-tcpdump
      - name: Add luci-app-tcpdump (KFERMercer)
        run: |
          cd istoreos/package
          git clone https://github.com/KFERMercer/luci-app-tcpdump.git

      - name: Config and fix libdeflate-gzip
        run: |
          cd istoreos
          # N1/arm64 配置
          cat > .config << EOF
          CONFIG_TARGET_armvirt=y
          CONFIG_TARGET_armvirt_64=y
          CONFIG_TARGET_armvirt_64_Default=y
          CONFIG_PACKAGE_luci-app-tcpdump=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_libpcap=y
          EOF

          make defconfig

          # 修复 libdeflate-gzip 不存在
          mkdir -p staging_dir/host/bin
          ln -sf /usr/bin/gzip staging_dir/host/bin/libdeflate-gzip

      - name: Compile luci-app-tcpdump
        run: |
          cd istoreos
          make package/luci-app-tcpdump/compile V=s -j$(nproc)

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-tcpdump-ipk
          path: |
            istoreos/bin/packages/aarch64_generic/luci/luci-app-tcpdump*.ipk